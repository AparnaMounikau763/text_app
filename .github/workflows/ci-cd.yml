name: Python CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - run: python -m pip install --upgrade pip
    - run: pip install -r requirements.txt
    - run: pytest --cov=app --cov-report=term-missing

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - run: python -m pip install --upgrade pip
    - run: pip install setuptools wheel
    - run: python setup.py sdist bdist_wheel
    - uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/*.whl

  deploy-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - run: python -m pip install --upgrade pip
    - uses: actions/download-artifact@v4
      with:
        name: python-package
        path: dist/
    - run: pip install -r requirements.txt
    - run: pip install dist/*.whl
    - run: python -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"
    - run: pytest

  docker:
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: docker build -t text-app .
    - run: docker run text-app

  deploy-ec2:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv
          rm -rf text_app
          git clone https://github.com/AparnaMounikau763/text_app.git
          cd text_app
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python setup.py sdist bdist_wheel
          pip install dist/*.whl
          python -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"
