name: Python CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

# ----------------------------------
# 1. TEST BEFORE DEPLOYMENT (CI)
# ----------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run unit + functional tests
      run: |
        pytest --cov=app --cov-report=term-missing

# ----------------------------------
# 2. BUILD PACKAGE
# ----------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install build tools
      run: |
        pip install setuptools wheel

    - name: Build package
      run: |
        python setup.py sdist bdist_wheel

    - name: Upload artifact (package)
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/*.whl

# ----------------------------------
# 3. DEPLOY + TEST ON LINUX (CD)
# ----------------------------------
  deploy-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Download built package
      uses: actions/download-artifact@v4
      with:
        name: python-package
        path: dist/

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install package
      run: |
        pip install dist/*.whl

    - name: Smoke Test
      run: |
        python -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"

    - name: Run system + regression tests
      run: |
        pytest
