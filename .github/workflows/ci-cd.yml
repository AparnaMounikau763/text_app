name: CI-CD Pipeline (Test → Build → Deploy to AWS EC2)

on:
  push:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest --cov=app

  build:
    name: Build Package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build Wheel
        run: |
          pip install setuptools wheel
          python setup.py sdist bdist_wheel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/

  deploy:
    name: Deploy to AWS EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: package

      # Create SSH key file
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # Deploy to EC2
      - name: Copy and Deploy to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem *.whl \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/

      # Install & Run on EC2
      - name: Remote SSH Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "Updating server..."
          sudo apt update
          pip3 install --upgrade pip

          echo "Installing package..."
          pip3 install *.whl

          echo "Running sanity check..."
          python3 -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"

          echo "Deployment SUCCESS"
          EOF
