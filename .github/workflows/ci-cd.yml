name: Python CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

# ----------------------------------
# 1. TEST BEFORE DEPLOYMENT (CI)
# ----------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run unit + functional tests
      run: |
        pytest --cov=app --cov-report=term-missing

# ----------------------------------
# 2. BUILD PACKAGE
# ----------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install build tools
      run: |
        pip install setuptools wheel

    - name: Build package
      run: |
        python setup.py sdist bdist_wheel

    - name: Upload artifact (package)
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/*.whl

# ----------------------------------
# 3. DEPLOY + TEST ON LINUX (CD)
# ----------------------------------
  deploy-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Download built package
      uses: actions/download-artifact@v4
      with:
        name: python-package
        path: dist/

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install package
      run: |
        pip install dist/*.whl

    - name: Smoke Test
      run: |
        python -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"

    - name: Run system + regression tests
      run: |
        pytest

# ----------------------------------
# 4. DOCKER BUILD & TEST
# ----------------------------------
  docker:
    needs: deploy-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t text-app .

    - name: Run Docker container
      run: |
        docker run text-app

# ----------------------------------
# 5. DEPLOY TO EC2 (REAL LINUX)
# ----------------------------------
  deploy-ec2:
    needs: docker
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~

          # Remove old deployment
          rm -rf text_app

          # Clone latest repo
          git clone https://github.com/AparnaMounikau763/text_app.git
          cd text_app

          # Setup virtual environment
          python3 -m venv venv
          source venv/bin/activate

          # Install dependencies
          pip install -r requirements.txt

          # Build package inside EC2 (safer)
          python setup.py sdist bdist_wheel
          pip install dist/*.whl

          # Smoke test
          python -c "from app.sentiment import analyze_sentiment; print(analyze_sentiment('good'))"
